<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무적의 야생마 — VOTE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #ffe066;
  --gold-dk: #b8860b;
  --blue: #88aaff;
  --bg: #0a0a1f;
  --card: #111130;
  --border: #2a2a5a;
  --green: #22c55e;
  --red: #ef4444;
}

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Press Start 2P', 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
  gap: 20px;
}

/* scanline */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── HEADER ── */
.header {
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.header-title {
  font-size: clamp(12px, 4vw, 20px);
  color: var(--gold);
  text-shadow: 3px 3px 0 var(--gold-dk);
  letter-spacing: 0.15em;
  animation: titlePulse 2s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100% { color: var(--gold); }
  50%      { color: #fff5aa; }
}
.header-sub {
  font-size: clamp(7px, 2.5vw, 10px);
  color: var(--blue);
  letter-spacing: 0.2em;
}

/* ── STEP INDICATOR ── */
.steps {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 8px;
  color: #555;
  letter-spacing: 0.15em;
}
.step {
  padding: 4px 8px;
  border: 2px solid #2a2a5a;
  border-radius: 2px;
  transition: all 0.2s;
}
.step.active  { border-color: var(--gold); color: var(--gold); }
.step.done    { border-color: #22c55e; color: #22c55e; }
.step-divider { color: #333; }

/* ── FORM SECTIONS ── */
.form-section {
  width: 100%;
  max-width: 480px;
  display: none;
  flex-direction: column;
  gap: 14px;
}
.form-section.active { display: flex; }

/* ── TEAM INPUT ── */
.field-label {
  font-size: 9px;
  color: #aaa;
  letter-spacing: 0.2em;
  margin-bottom: 2px;
}
.field-hint {
  font-size: 7px;
  color: #555;
  letter-spacing: 0.1em;
  line-height: 1.8;
}
.team-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 4px;
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(10px, 3vw, 14px);
  letter-spacing: 0.1em;
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
}
.team-input:focus { border-color: var(--gold); }
.team-input.error { border-color: var(--red); }

.next-btn {
  width: 100%;
  padding: 14px;
  background: #0d2a0d;
  border: 3px solid var(--green);
  border-radius: 4px;
  color: var(--green);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(9px, 2.5vw, 12px);
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
.next-btn:hover { background: #1a3a1a; box-shadow: 0 0 10px rgba(34,197,94,0.3); }
.next-btn:active { transform: scale(0.97); }

.error-msg {
  font-size: 8px;
  color: var(--red);
  letter-spacing: 0.1em;
  text-align: center;
  min-height: 14px;
  line-height: 1.8;
}

/* ── CHARACTER GRID ── */
.char-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.char-card {
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 6px;
  padding: 12px 8px 10px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.15s, background 0.15s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.char-card:active { transform: scale(0.94); }
.char-card.selected {
  border-color: var(--gold);
  background: #1a1a40;
  box-shadow: 0 0 14px rgba(255,224,102,0.25);
}
.char-card.selected .char-name { color: var(--gold); }
.char-card .check {
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 10px;
  opacity: 0;
  transition: opacity 0.15s;
}
.char-card.selected .check { opacity: 1; }

.char-card canvas {
  image-rendering: pixelated;
  display: block;
  margin: 0 auto 4px;
}
.horse-icon { font-size: 18px; line-height: 1.3; margin-bottom: 2px; }
.char-name  { font-size: clamp(8px, 2.5vw, 11px); color: #ccc; letter-spacing: 0.05em; }

/* SUBMIT BUTTON */
.submit-btn {
  width: 100%;
  padding: 16px;
  background: #1a1a3a;
  border: 3px solid var(--border);
  border-radius: 4px;
  color: #555;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(9px, 2.5vw, 12px);
  letter-spacing: 0.15em;
  cursor: not-allowed;
  transition: all 0.2s;
  text-transform: uppercase;
}
.submit-btn.ready {
  background: #0d1a2a;
  border-color: var(--gold);
  color: var(--gold);
  cursor: pointer;
  animation: btnGlow 1.5s ease-in-out infinite;
}
@keyframes btnGlow {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,224,102,0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(255,224,102,0); }
}
.submit-btn.ready:active { transform: scale(0.97); }

/* vote-for label */
.vote-for-label {
  font-size: 8px;
  color: #555;
  text-align: center;
  letter-spacing: 0.15em;
}
.vote-for-label span { color: var(--blue); }

/* ── STATE SCREENS ── */
.state-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 18px;
  min-height: 60vh;
  width: 100%;
  max-width: 480px;
}
.state-screen.visible { display: flex; }

.state-icon  { font-size: 52px; }
.state-title {
  font-size: clamp(13px, 4vw, 20px);
  color: var(--gold);
  text-shadow: 3px 3px 0 var(--gold-dk);
  letter-spacing: 0.2em;
  line-height: 1.8;
}
.state-detail {
  font-size: clamp(8px, 2.5vw, 11px);
  color: var(--blue);
  letter-spacing: 0.15em;
  line-height: 2;
}
.state-note {
  font-size: 8px;
  color: #555;
  letter-spacing: 0.1em;
  line-height: 1.8;
}
.retry-btn {
  padding: 12px 24px;
  background: #1a1a3a;
  border: 3px solid var(--red);
  border-radius: 4px;
  color: var(--red);
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.15s;
}
.retry-btn:hover { background: #2a1a1a; }

/* loading dots */
.loading-dots::after {
  content: '';
  animation: dots 1.2s steps(4,end) infinite;
}
@keyframes dots {
  0%  { content: '';    }
  25% { content: '.';   }
  50% { content: '..';  }
  75% { content: '...'; }
}

/* round status */
.round-status {
  font-size: 7px;
  color: #333;
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 2;
}
.round-status .dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #333;
  margin-right: 4px;
  vertical-align: middle;
}
.round-status.ok .dot   { background: var(--green); box-shadow: 0 0 4px var(--green); }
.round-status.err .dot  { background: var(--red); }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-title">🐎 CAST YOUR VOTE</div>
  <div class="header-sub">무적의 야생마</div>
</div>

<!-- ═══ STEP INDICATOR ═══ -->
<div class="steps">
  <div class="step" id="step1El">01 팀명</div>
  <div class="step-divider">›</div>
  <div class="step" id="step2El">02 캐릭터</div>
  <div class="step-divider">›</div>
  <div class="step" id="step3El">03 완료</div>
</div>

<!-- ═══ STEP 1: 팀명 입력 ═══ -->
<div class="form-section active" id="step1">
  <div>
    <div class="field-label">조 이름</div>
    <div class="field-hint">예: 무야조</div>
  </div>
  <input type="text" class="team-input" id="teamInput"
    placeholder="팀명을 입력하세요"
    maxlength="20"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false">
  <div class="error-msg" id="teamError"></div>
  <button class="next-btn" onclick="goStep2()">▶ 다음 — 캐릭터 선택</button>
  <div class="round-status" id="roundStatus">
    <span class="dot"></span>
    <span id="roundStatusText">라운드 정보 불러오는 중...</span>
  </div>
</div>

<!-- ═══ STEP 2: 캐릭터 선택 ═══ -->
<div class="form-section" id="step2">
  <div class="char-grid" id="charGrid"></div>
  <div class="vote-for-label pixel-text" id="voteForLabel">캐릭터를 선택하세요</div>
  <div class="error-msg" id="charError"></div>
  <button class="submit-btn pixel-text" id="submitBtn" disabled>
    SELECT A CHARACTER
  </button>
</div>

<!-- ═══ SUBMITTING ═══ -->
<div class="state-screen" id="stateSubmitting">
  <div class="state-icon">⏳</div>
  <div class="state-title">SUBMITTING<span class="loading-dots"></span></div>
  <div class="state-detail">잠시만 기다려주세요</div>
</div>

<!-- ═══ SUCCESS ═══ -->
<div class="state-screen" id="stateSuccess">
  <div class="state-icon">🏆</div>
  <div class="state-title">VOTE CAST!</div>
  <div class="state-detail" id="successDetail">— —</div>
  <div class="state-detail" style="color:#22c55e;">투표가 완료되었습니다!</div>
  <div class="state-note">이 화면을 닫아도 됩니다</div>
</div>

<!-- ═══ ERROR ═══ -->
<div class="state-screen" id="stateError">
  <div class="state-icon">⚠️</div>
  <div class="state-title" style="color:#ef4444;">ERROR</div>
  <div class="state-detail" id="errorDetail" style="color:#ef4444;">오류가 발생했습니다</div>
  <button class="retry-btn pixel-text" onclick="resetToStep1()">↩ 다시 시도</button>
</div>

<script>
/* ══════════════════════════════════════
   FIREBASE CONFIG
══════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCB-XAqzgTkof5NIyevgUNyg8bIHKSjuYo",
  authDomain:        "tptk-b610a.firebaseapp.com",
  projectId:         "tptk-b610a",
  storageBucket:     "tptk-b610a.firebasestorage.app",
  messagingSenderId: "1017440166838",
  appId:             "1:1017440166838:web:3a79df896cf225a3e71717"
};
const VOTES_COLLECTION  = 'votes';
const ROUNDS_COLLECTION = 'rounds';

/* ══════════════════════════════════════
   CHARACTERS
══════════════════════════════════════ */
const CHARACTERS = [
  { name: '정환', color: '#ff6b6b', skin: '#f4a26a' },
  { name: '장우', color: '#4ecdc4', skin: '#d4956a' },
  { name: '사랑', color: '#ffe066', skin: '#f9c48a' },
  { name: '솔지', color: '#a78bfa', skin: '#f4a26a' },
  { name: '지영', color: '#f97316', skin: '#d4956a' },
  { name: '승훈', color: '#22c55e', skin: '#f4a26a' },
  { name: '가희', color: '#ec4899', skin: '#f9c48a' },
  { name: '서영', color: '#06b6d4', skin: '#f4a26a' },
  { name: '수연', color: '#84cc16', skin: '#f9c48a' },
  { name: '나현', color: '#f59e0b', skin: '#d4956a' },
  { name: '승균', color: '#3b82f6', skin: '#f4a26a' },
  { name: '소연', color: '#e879f9', skin: '#f9c48a' },
];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let db = null;
let currentRoundId = null;
let selectedCharacter = null;
let teamName = '';

/* ══════════════════════════════════════
   FIREBASE INIT & ROUND READ
══════════════════════════════════════ */
(async function init() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    const roundDoc = await db.collection(ROUNDS_COLLECTION).doc('current').get();
    if (roundDoc.exists) {
      currentRoundId = roundDoc.data().roundId;
      setRoundStatus('ok', '라운드 연결됨: ' + currentRoundId.slice(-6));
    } else {
      setRoundStatus('err', '진행 중인 라운드 없음 — 메인 화면 먼저 시작');
    }
  } catch (e) {
    console.error('Init error:', e);
    setRoundStatus('err', '연결 실패 — 네트워크 확인');
  }
})();

function setRoundStatus(state, msg) {
  const el = document.getElementById('roundStatus');
  const txt = document.getElementById('roundStatusText');
  el.className = 'round-status ' + state;
  txt.textContent = msg;
}

/* ══════════════════════════════════════
   PIXEL SPRITE
══════════════════════════════════════ */
function drawPixelPerson(canvas, shirtColor, skinColor) {
  const ctx = canvas.getContext('2d');
  const S = canvas.width / 10;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  function px(x, y, w, h, c) {
    ctx.fillStyle = c; ctx.fillRect(x*S, y*S, w*S, h*S);
  }
  px(3,0,4,3,skinColor); px(3,0,4,1,'#1a1a1a');
  px(3.5,1,0.8,0.8,'#222'); px(5.7,1,0.8,0.8,'#222');
  px(2.5,3,5,3.5,shirtColor);
  px(1,3,1.5,2.5,shirtColor); px(7.5,3,1.5,2.5,shirtColor);
  px(2.5,6.5,2.2,3,'#3344aa'); px(5.3,6.5,2.2,3,'#3344aa');
  px(2.2,9.5,2.5,0.8,'#222'); px(5.3,9.5,2.5,0.8,'#222');
}

/* ══════════════════════════════════════
   BUILD GRID
══════════════════════════════════════ */
const grid = document.getElementById('charGrid');
const submitBtn = document.getElementById('submitBtn');

CHARACTERS.forEach(ch => {
  const card = document.createElement('div');
  card.className = 'char-card';

  const check = document.createElement('span');
  check.className = 'check'; check.textContent = '✓';
  card.appendChild(check);

  const cvs = document.createElement('canvas');
  cvs.width = cvs.height = 36;
  cvs.style.cssText = 'width:36px;height:36px;';
  card.appendChild(cvs);

  const horse = document.createElement('div');
  horse.className = 'horse-icon'; horse.textContent = '🐎';
  card.appendChild(horse);

  const name = document.createElement('div');
  name.className = 'char-name pixel-text'; name.textContent = ch.name;
  card.appendChild(name);

  card.addEventListener('click', () => selectChar(ch.name, card));
  grid.appendChild(card);
  requestAnimationFrame(() => drawPixelPerson(cvs, ch.color, ch.skin));
});

function selectChar(name, cardEl) {
  document.querySelectorAll('.char-card.selected').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  selectedCharacter = name;

  const label = document.getElementById('voteForLabel');
  label.innerHTML = `<span>${teamName}</span>의 선택: <span>${name}</span>`;

  submitBtn.disabled = false;
  submitBtn.classList.add('ready');
  submitBtn.textContent = `▶ ${name}에게 투표`;
}

/* ══════════════════════════════════════
   STEP NAVIGATION
══════════════════════════════════════ */
function setStep(n) {
  document.getElementById('step1').classList.toggle('active', n === 1);
  document.getElementById('step2').classList.toggle('active', n === 2);

  ['step1El','step2El','step3El'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step' + (i+1 < n ? ' done' : i+1 === n ? ' active' : '');
  });
}

function goStep2() {
  const val = document.getElementById('teamInput').value.trim();
  const errEl = document.getElementById('teamError');
  const inp = document.getElementById('teamInput');

  if (!val) {
    errEl.textContent = '팀명을 입력해주세요!';
    inp.classList.add('error');
    inp.focus();
    return;
  }
  errEl.textContent = '';
  inp.classList.remove('error');
  teamName = val;
  setStep(2);
}

function resetToStep1() {
  selectedCharacter = null;
  submitBtn.disabled = true;
  submitBtn.classList.remove('ready');
  submitBtn.textContent = 'SELECT A CHARACTER';
  document.querySelectorAll('.char-card.selected').forEach(c => c.classList.remove('selected'));
  document.getElementById('voteForLabel').textContent = '캐릭터를 선택하세요';
  hideAll();
  setStep(1);
}

/* ══════════════════════════════════════
   SUBMIT
══════════════════════════════════════ */
submitBtn.addEventListener('click', async () => {
  if (!selectedCharacter || submitBtn.disabled) return;
  submitBtn.disabled = true;

  if (!db) {
    showError('Firebase 초기화 실패\n네트워크 확인 후 재시도');
    return;
  }
  if (!currentRoundId) {
    showError('진행 중인 라운드가 없습니다\n메인 화면에서 게임을 먼저 시작해주세요');
    return;
  }

  showState('submitting');

  try {
    await db.collection(VOTES_COLLECTION).add({
      team:      teamName,
      character: selectedCharacter,
      timestamp: Date.now(),
      roundId:   currentRoundId
    });
    showSuccess(teamName, selectedCharacter);
  } catch (err) {
    console.error('Vote error:', err);
    showError('저장 실패\n잠시 후 다시 시도해주세요\n\n' + err.message);
  }
});

// Enter on team input → go to step 2
document.getElementById('teamInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') goStep2();
});

/* ══════════════════════════════════════
   STATE HELPERS
══════════════════════════════════════ */
function hideAll() {
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.remove('active');
  document.getElementById('stateSubmitting').classList.remove('visible');
  document.getElementById('stateSuccess').classList.remove('visible');
  document.getElementById('stateError').classList.remove('visible');
}

function showState(state) {
  hideAll();
  document.getElementById('state' +
    state.charAt(0).toUpperCase() + state.slice(1)).classList.add('visible');
}

function showSuccess(team, char) {
  document.getElementById('step3El').className = 'step done';
  document.getElementById('successDetail').innerHTML =
    `<span style="color:#ffe066">${team}</span> / <span style="color:#88aaff">${char}</span>`;
  showState('success');
}

function showError(msg) {
  document.getElementById('errorDetail').textContent = msg;
  showState('error');
}
</script>
</body>
</html>
