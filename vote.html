<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무적의 야생마 — VOTE</title>
<style>@font-face { font-family: 'NeoDunggeunmo'; src: url('neodgm.woff2') format('woff2'); font-weight: normal; font-style: normal; }</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #ffe066;
  --gold-dk: #b8860b;
  --blue: #88aaff;
  --bg: #0a0a1f;
  --card: #111130;
  --border: #2a2a5a;
  --green: #22c55e;
  --red: #ef4444;
}

body {
  background: var(--bg);
  color: #fff;
  font-family: 'NeoDunggeunmo', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
  gap: 20px;
}

/* scanline */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── HEADER ── */
.header {
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.header-title {
  font-size: clamp(12px, 4vw, 20px);
  color: var(--gold);
  text-shadow: 3px 3px 0 var(--gold-dk);
  letter-spacing: 0.15em;
  animation: titlePulse 2s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100% { color: var(--gold); }
  50%      { color: #fff5aa; }
}
.header-sub {
  font-size: clamp(7px, 2.5vw, 10px);
  color: var(--blue);
  letter-spacing: 0.2em;
}

/* ── STEP INDICATOR ── */
.steps {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 8px;
  color: #555;
  letter-spacing: 0.15em;
}
.step {
  padding: 4px 8px;
  border: 2px solid #2a2a5a;
  border-radius: 2px;
  transition: all 0.2s;
}
.step.active  { border-color: var(--gold); color: var(--gold); }
.step.done    { border-color: #22c55e; color: #22c55e; }
.step-divider { color: #333; }

/* ── FORM SECTIONS ── */
.form-section {
  width: 100%;
  max-width: 480px;
  display: none;
  flex-direction: column;
  gap: 14px;
}
.form-section.active { display: flex; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 9px;
  color: #aaa;
  letter-spacing: 0.2em;
  text-align: center;
}

/* ── TEAM GRID ── */
.team-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.team-card {
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 6px;
  padding: 14px 10px 12px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.team-card:active { transform: scale(0.94); }
.team-card:hover:not(.selected) {
  border-color: #4a4a8a;
  background: #161640;
}
.team-card.selected {
  border-color: var(--gold);
  background: #1a1a40;
  box-shadow: 0 0 16px rgba(255,224,102,0.3), inset 0 0 8px rgba(255,224,102,0.05);
}
.team-card.selected .team-name { color: var(--gold); }
.team-card.selected .team-check { opacity: 1; }

.team-check {
  position: absolute;
  top: 5px;
  right: 7px;
  font-size: 10px;
  color: var(--gold);
  opacity: 0;
  transition: opacity 0.15s;
}

.team-num {
  font-size: 7px;
  color: #555;
  letter-spacing: 0.1em;
}
.team-card.selected .team-num { color: #a88830; }

.team-emoji {
  font-size: 22px;
  line-height: 1;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

.team-name {
  font-size: clamp(7px, 2.5vw, 10px);
  color: #ccc;
  letter-spacing: 0.05em;
  line-height: 1.6;
  word-break: keep-all;
}

@keyframes cardPop {
  0%   { transform: scale(0.92); opacity: 0; }
  60%  { transform: scale(1.04); }
  100% { transform: scale(1);    opacity: 1; }
}
.team-card { animation: cardPop 0.25s ease-out both; }

/* ── NEXT BUTTON ── */
.next-btn {
  width: 100%;
  padding: 14px;
  background: #1a1a3a;
  border: 3px solid var(--border);
  border-radius: 4px;
  color: #555;
  font-family: 'NeoDunggeunmo', monospace;
  font-size: clamp(9px, 2.5vw, 12px);
  letter-spacing: 0.2em;
  cursor: not-allowed;
  transition: all 0.15s;
  text-transform: uppercase;
}
.next-btn.ready {
  background: #0d2a0d;
  border-color: var(--green);
  color: var(--green);
  cursor: pointer;
  animation: btnGlow 1.5s ease-in-out infinite;
}
@keyframes btnGlow {
  0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
}
.next-btn.ready:hover { background: #1a3a1a; }
.next-btn.ready:active { transform: scale(0.97); }

.error-msg {
  font-size: 8px;
  color: var(--red);
  letter-spacing: 0.1em;
  text-align: center;
  min-height: 14px;
  line-height: 1.8;
}

/* ── CHARACTER GRID ── */
.char-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.char-card {
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 6px;
  padding: 12px 8px 10px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.15s, background 0.15s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.char-card:active { transform: scale(0.94); }
.char-card.selected {
  border-color: var(--gold);
  background: #1a1a40;
  box-shadow: 0 0 14px rgba(255,224,102,0.25);
}
.char-card.selected .char-name { color: var(--gold); }
.char-card .check {
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 10px;
  opacity: 0;
  transition: opacity 0.15s;
}
.char-card.selected .check { opacity: 1; }

.char-card canvas {
  image-rendering: pixelated;
  display: block;
  margin: 0 auto 4px;
}
.horse-icon { font-size: 18px; line-height: 1.3; margin-bottom: 2px; }
.char-name  { font-size: clamp(8px, 2.5vw, 11px); color: #ccc; letter-spacing: 0.05em; }

/* ── SUBMIT BUTTON ── */
.submit-btn {
  width: 100%;
  padding: 16px;
  background: #1a1a3a;
  border: 3px solid var(--border);
  border-radius: 4px;
  color: #555;
  font-family: 'NeoDunggeunmo', monospace;
  font-size: clamp(9px, 2.5vw, 12px);
  letter-spacing: 0.15em;
  cursor: not-allowed;
  transition: all 0.2s;
  text-transform: uppercase;
}
.submit-btn.ready {
  background: #0d1a2a;
  border-color: var(--gold);
  color: var(--gold);
  cursor: pointer;
  animation: submitGlow 1.5s ease-in-out infinite;
}
@keyframes submitGlow {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,224,102,0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(255,224,102,0); }
}
.submit-btn.ready:active { transform: scale(0.97); }

/* vote-for label */
.vote-for-label {
  font-size: 8px;
  color: #555;
  text-align: center;
  letter-spacing: 0.15em;
}
.vote-for-label span { color: var(--blue); }
.vote-for-label .team-highlight { color: var(--gold); }

/* ── STATE SCREENS ── */
.state-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 18px;
  min-height: 60vh;
  width: 100%;
  max-width: 480px;
}
.state-screen.visible { display: flex; }

.state-icon  { font-size: 52px; }
.state-title {
  font-size: clamp(13px, 4vw, 20px);
  color: var(--gold);
  text-shadow: 3px 3px 0 var(--gold-dk);
  letter-spacing: 0.2em;
  line-height: 1.8;
}
.state-detail {
  font-size: clamp(8px, 2.5vw, 11px);
  color: var(--blue);
  letter-spacing: 0.15em;
  line-height: 2;
}
.state-note {
  font-size: 8px;
  color: #555;
  letter-spacing: 0.1em;
  line-height: 1.8;
}
.retry-btn {
  padding: 12px 24px;
  background: #1a1a3a;
  border: 3px solid var(--red);
  border-radius: 4px;
  color: var(--red);
  font-family: 'NeoDunggeunmo', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.15s;
}
.retry-btn:hover { background: #2a1a1a; }

/* loading dots */
.loading-dots::after {
  content: '';
  animation: dots 1.2s steps(4,end) infinite;
}
@keyframes dots {
  0%  { content: '';    }
  25% { content: '.';   }
  50% { content: '..';  }
  75% { content: '...'; }
}

/* round status */
.round-status {
  font-size: 7px;
  color: #333;
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 2;
}
.round-status .dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #333;
  margin-right: 4px;
  vertical-align: middle;
}
.round-status.ok .dot   { background: var(--green); box-shadow: 0 0 4px var(--green); }
.round-status.err .dot  { background: var(--red); }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-title">🐎 CAST YOUR VOTE</div>
  <div class="header-sub">무적의 야생마</div>
</div>

<!-- ═══ STEP INDICATOR ═══ -->
<div class="steps">
  <div class="step" id="step1El">01 조 선택</div>
  <div class="step-divider">›</div>
  <div class="step" id="step2El">02 말 선택</div>
  <div class="step-divider">›</div>
  <div class="step" id="step3El">03 완료</div>
</div>

<!-- ═══ STEP 1: 조 선택 ═══ -->
<div class="form-section active" id="step1">
  <div class="section-label">우리 조를 선택하세요</div>

  <div class="team-grid" id="teamGrid"></div>

  <div class="error-msg" id="teamError"></div>

  <button class="next-btn" id="nextBtn" disabled onclick="goStep2()">
    SELECT YOUR TEAM
  </button>

  <div class="round-status" id="roundStatus">
    <span class="dot"></span>
    <span id="roundStatusText">라운드 정보 불러오는 중...</span>
  </div>
</div>

<!-- ═══ STEP 2: 말 선택 ═══ -->
<div class="form-section" id="step2">
  <div class="char-grid" id="charGrid"></div>
  <div class="vote-for-label pixel-text" id="voteForLabel">말을 선택하세요</div>
  <div class="error-msg" id="charError"></div>
  <button class="submit-btn pixel-text" id="submitBtn" disabled>
    SELECT A CHARACTER
  </button>
</div>

<!-- ═══ SUBMITTING ═══ -->
<div class="state-screen" id="stateSubmitting">
  <div class="state-icon">⏳</div>
  <div class="state-title">SUBMITTING<span class="loading-dots"></span></div>
  <div class="state-detail">잠시만 기다려주세요</div>
</div>

<!-- ═══ SUCCESS ═══ -->
<div class="state-screen" id="stateSuccess">
  <div class="state-icon">🏆</div>
  <div class="state-title">VOTE CAST!</div>
  <div class="state-detail" id="successDetail">— —</div>
  <div class="state-detail" style="color:#22c55e;">투표가 완료되었습니다!</div>
  <div class="state-note">이 화면을 닫아도 됩니다</div>
</div>

<!-- ═══ ERROR ═══ -->
<div class="state-screen" id="stateError">
  <div class="state-icon">⚠️</div>
  <div class="state-title" style="color:#ef4444;">ERROR</div>
  <div class="state-detail" id="errorDetail" style="color:#ef4444;">오류가 발생했습니다</div>
  <button class="retry-btn pixel-text" onclick="resetToStep1()">↩ 다시 시도</button>
</div>

<script>
/* ══════════════════════════════════════
   FIREBASE CONFIG
══════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCB-XAqzgTkof5NIyevgUNyg8bIHKSjuYo",
  authDomain:        "tptk-b610a.firebaseapp.com",
  projectId:         "tptk-b610a",
  storageBucket:     "tptk-b610a.firebasestorage.app",
  messagingSenderId: "1017440166838",
  appId:             "1:1017440166838:web:3a79df896cf225a3e71717"
};
const VOTES_COLLECTION  = 'votes';
const ROUNDS_COLLECTION = 'rounds';

/* ══════════════════════════════════════
   TEAMS (고정 6개 조)
══════════════════════════════════════ */
const TEAMS = [
  { name: '원조 TP',        emoji: '👑' },
  { name: '2전가격',        emoji: '💰' },
  { name: '드래곤즈',       emoji: '🐉' },
  { name: '하이파이브',     emoji: '✋' },
  { name: '육퀴즈온더삼일', emoji: '🎯' },
  { name: '7ㅏ보자',        emoji: '🚀' },
];

/* ══════════════════════════════════════
   CHARACTERS
══════════════════════════════════════ */
const CHARACTERS = [
  { name: '정환', color: '#FF2233', skin: '#f4a26a', accessory: 'glasses'    },
  { name: '장우', color: '#1A237E', skin: '#d4956a', accessory: 'ribbon'     },
  { name: '사랑', color: '#FFE000', skin: '#f9c48a', accessory: 'crown'      },
  { name: '솔지', color: '#8833FF', skin: '#f4a26a', accessory: 'hat'        },
  { name: '지영', color: '#FF6600', skin: '#d4956a', accessory: 'headphones' },
  { name: '승훈', color: '#22EE44', skin: '#f4a26a', accessory: 'headband'   },
  { name: '가희', color: '#BBEE00', skin: '#f9c48a', accessory: 'star'       },
  { name: '서영', color: '#FFB3C6', skin: '#f4a26a', accessory: 'beret'      },
  { name: '수연', color: '#00CCDD', skin: '#f9c48a', accessory: 'flower'     },
  { name: '나현', color: '#FFAA00', skin: '#d4956a', accessory: 'heart'      },
  { name: '승균', color: '#5522CC', skin: '#f4a26a', accessory: 'sunglasses' },
  { name: '소연', color: '#FF22CC', skin: '#f9c48a', accessory: 'catears'    },
];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let db = null;
let currentRoundId = null;
let selectedCharacter = null;
let teamName = '';

/* ══════════════════════════════════════
   FIREBASE INIT & ROUND READ
══════════════════════════════════════ */
(async function init() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    const roundDoc = await db.collection(ROUNDS_COLLECTION).doc('current').get();
    if (roundDoc.exists) {
      currentRoundId = roundDoc.data().roundId;
      setRoundStatus('ok', '라운드 연결됨: ' + currentRoundId.slice(-6));
    } else {
      setRoundStatus('err', '진행 중인 라운드 없음 — 메인 화면 먼저 시작');
    }
  } catch (e) {
    console.error('Init error:', e);
    setRoundStatus('err', '연결 실패 — 네트워크 확인');
  }
})();

function setRoundStatus(state, msg) {
  const el = document.getElementById('roundStatus');
  const txt = document.getElementById('roundStatusText');
  el.className = 'round-status ' + state;
  txt.textContent = msg;
}

/* ══════════════════════════════════════
   BUILD TEAM GRID
══════════════════════════════════════ */
(function buildTeamGrid() {
  const grid = document.getElementById('teamGrid');
  TEAMS.forEach((team, i) => {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.style.animationDelay = `${i * 0.06}s`;

    card.innerHTML = `
      <span class="team-check">✓</span>
      <div class="team-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="team-emoji">${team.emoji}</div>
      <div class="team-name pixel-text">${team.name}</div>
    `;

    card.addEventListener('click', () => selectTeam(team.name, card));
    grid.appendChild(card);
  });
})();

async function selectTeam(name, cardEl) {
  document.querySelectorAll('.team-card.selected').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  teamName = name;

  const nextBtn = document.getElementById('nextBtn');
  const errEl   = document.getElementById('teamError');
  nextBtn.disabled = true;
  nextBtn.classList.remove('ready');
  nextBtn.textContent = '확인 중...';
  errEl.textContent = '';

  if (db && currentRoundId) {
    try {
      const snap = await db.collection(VOTES_COLLECTION)
        .where('roundId', '==', currentRoundId)
        .where('team',    '==', name)
        .get();
      if (!snap.empty) {
        errEl.textContent = '이미 해당 팀에 투표했습니다.';
        cardEl.classList.remove('selected');
        teamName = '';
        nextBtn.textContent = 'SELECT YOUR TEAM';
        return;
      }
    } catch (e) {
      console.warn('Duplicate check error:', e);
    }
  }

  nextBtn.disabled = false;
  nextBtn.classList.add('ready');
  nextBtn.textContent = `▶ ${name} 선택 완료`;
}

/* ══════════════════════════════════════
   PIXEL SPRITE
══════════════════════════════════════ */
function drawPixelPerson(canvas, shirtColor, skinColor) {
  const ctx = canvas.getContext('2d');
  const S = canvas.width / 10;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  function px(x, y, w, h, c) {
    ctx.fillStyle = c; ctx.fillRect(x*S, y*S, w*S, h*S);
  }
  px(3,0,4,3,skinColor); px(3,0,4,1,'#1a1a1a');
  px(3.5,1,0.8,0.8,'#222'); px(5.7,1,0.8,0.8,'#222');
  px(2.5,3,5,3.5,shirtColor);
  px(1,3,1.5,2.5,shirtColor); px(7.5,3,1.5,2.5,shirtColor);
  px(2.5,6.5,2.2,3,'#3344aa'); px(5.3,6.5,2.2,3,'#3344aa');
  px(2.2,9.5,2.5,0.8,'#222'); px(5.3,9.5,2.5,0.8,'#222');
}

/* ══════════════════════════════════════
   ACCESSORY OVERLAY  (opening.html과 동일)
══════════════════════════════════════ */
function shadeHex(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const cl = v => Math.min(255, Math.max(0, v));
  const r = cl((n >> 16) + amt), g = cl(((n >> 8) & 0xff) + amt), b = cl((n & 0xff) + amt);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function drawAccessory(canvas, type, charColor) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  /* canvas는 36×36, S=3.6 → 정수로 다루기 위해 스케일 조정
     opening(40px)과 head 비율 동일: head x=12-27 y=0-11 → 36px에서 x=10.8-24.3
     근사값으로 opening 좌표 × 0.9 사용 */
  const sc = canvas.width / 40; // 0.9
  const f = (x, y, w, h, c) => {
    ctx.fillStyle = c;
    ctx.fillRect(Math.round(x*sc), Math.round(y*sc), Math.round(w*sc)||1, Math.round(h*sc)||1);
  };
  switch (type) {
    case 'glasses': {
      const c = '#111111';
      f(13,4,7,1,c); f(13,8,7,1,c); f(13,4,1,5,c); f(19,4,1,5,c);
      f(21,4,7,1,c); f(21,8,7,1,c); f(21,4,1,5,c); f(27,4,1,5,c);
      f(20,6,1,1,c); f(12,6,1,2,c); f(28,6,1,2,c);
      break;
    }
    case 'ribbon': {
      const c = '#ff88cc', k = '#cc2266';
      f(19,0,3,1,c); f(18,1,4,1,c); f(19,2,3,1,c);
      f(22,1,2,1,k);
      f(24,0,3,1,c); f(24,1,4,1,c); f(24,2,3,1,c);
      break;
    }
    case 'crown': {
      const g = '#ffe066', d = '#b8860b';
      f(13,0,2,1,g); f(19,0,2,1,g); f(25,0,2,1,g);
      f(12,1,16,3,g); f(12,4,16,1,d);
      f(14,2,2,1,'#ff4444'); f(19,2,2,1,'#4499ff'); f(24,2,2,1,'#44dd44');
      break;
    }
    case 'hat': {
      const dk = shadeHex(charColor,-35), lt = shadeHex(charColor,+40);
      f(14,0,12,4,charColor); f(13,2,14,2,charColor);
      f(12,3,16,1,dk); f(22,0,3,1,lt);
      break;
    }
    case 'headphones': {
      const b = '#1a1a33', p = '#3355cc';
      f(13,0,14,2,b);
      f(9,3,4,6,b); f(10,4,2,5,p);
      f(27,3,4,6,b); f(28,4,2,5,p);
      break;
    }
    case 'headband': {
      const dk = shadeHex(charColor,-30);
      f(12,1,16,2,charColor); f(12,1,16,1,dk);
      break;
    }
    case 'star': {
      const y = '#ffee00';
      f(19,0,2,1,y); f(18,1,4,1,y); f(17,2,6,1,y);
      f(17,3,1,1,y); f(18,3,4,1,y); f(22,3,1,1,y); f(19,4,2,1,y);
      break;
    }
    case 'beret': {
      const dk = shadeHex(charColor,-30), lt = shadeHex(charColor,+35);
      f(14,0,12,1,lt); f(13,1,14,2,charColor);
      f(12,3,16,1,dk); f(24,0,2,1,lt);
      break;
    }
    case 'flower': {
      const p = '#ff99bb', c = '#ffe066';
      f(20,0,2,2,p); f(18,2,2,2,p); f(22,2,2,2,p); f(20,4,2,2,p); f(20,2,2,2,c);
      break;
    }
    case 'heart': {
      const r = '#ff3366';
      f(18,0,2,2,r); f(21,0,2,2,r); f(17,2,7,2,r);
      f(18,4,5,1,r); f(19,5,3,1,r); f(20,6,1,1,r);
      break;
    }
    case 'sunglasses': {
      ctx.fillStyle = 'rgba(0,60,130,0.82)';
      ctx.fillRect(Math.round(14*sc), Math.round(5*sc), Math.round(5*sc), Math.round(4*sc));
      ctx.fillRect(Math.round(22*sc), Math.round(5*sc), Math.round(5*sc), Math.round(4*sc));
      const g = '#ffe066';
      f(13,4,7,1,g); f(13,8,7,1,g); f(13,4,1,5,g); f(19,4,1,5,g);
      f(21,4,7,1,g); f(21,8,7,1,g); f(21,4,1,5,g); f(27,4,1,5,g);
      f(20,6,1,1,g); f(12,5,1,3,g); f(28,5,1,3,g);
      break;
    }
    case 'catears': {
      const inner = '#ffccf0';
      f(12,0,5,1,charColor); f(13,1,3,2,charColor); f(14,1,1,1,inner);
      f(23,0,5,1,charColor); f(24,1,3,2,charColor); f(24,1,1,1,inner);
      break;
    }
  }
}

/* ══════════════════════════════════════
   BUILD CHARACTER GRID
══════════════════════════════════════ */
const grid = document.getElementById('charGrid');
const submitBtn = document.getElementById('submitBtn');

CHARACTERS.forEach(ch => {
  const card = document.createElement('div');
  card.className = 'char-card';

  const check = document.createElement('span');
  check.className = 'check'; check.textContent = '✓';
  card.appendChild(check);

  // 스프라이트 wrapper (overlay 위치 기준)
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:relative;width:36px;height:36px;margin:0 auto 2px;display:block;';

  const cvs = document.createElement('canvas');
  cvs.width = cvs.height = 36;
  cvs.style.cssText = 'width:36px;height:36px;display:block;image-rendering:pixelated;';
  wrap.appendChild(cvs);

  const overlay = document.createElement('canvas');
  overlay.width = overlay.height = 36;
  overlay.style.cssText = 'position:absolute;top:0;left:0;width:36px;height:36px;pointer-events:none;image-rendering:pixelated;';
  wrap.appendChild(overlay);

  card.appendChild(wrap);

  const horse = document.createElement('div');
  horse.className = 'horse-icon'; horse.textContent = '🐎';
  card.appendChild(horse);

  const name = document.createElement('div');
  name.className = 'char-name pixel-text'; name.textContent = ch.name;
  card.appendChild(name);

  card.addEventListener('click', () => selectChar(ch.name, card));
  grid.appendChild(card);
  requestAnimationFrame(() => {
    drawPixelPerson(cvs, ch.color, ch.skin);
    if (ch.accessory) drawAccessory(overlay, ch.accessory, ch.color);
  });
});

function selectChar(name, cardEl) {
  document.querySelectorAll('.char-card.selected').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  selectedCharacter = name;

  const label = document.getElementById('voteForLabel');
  label.innerHTML = `<span class="team-highlight">${teamName}</span>의 선택: <span>${name}</span>`;

  submitBtn.disabled = false;
  submitBtn.classList.add('ready');
  submitBtn.textContent = `▶ ${name}에게 투표`;
}

/* ══════════════════════════════════════
   STEP NAVIGATION
══════════════════════════════════════ */
function setStep(n) {
  document.getElementById('step1').classList.toggle('active', n === 1);
  document.getElementById('step2').classList.toggle('active', n === 2);

  ['step1El','step2El','step3El'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step' + (i+1 < n ? ' done' : i+1 === n ? ' active' : '');
  });
}

function goStep2() {
  if (!teamName) {
    document.getElementById('teamError').textContent = '조를 선택해주세요!';
    return;
  }
  setStep(2);
}

function resetToStep1() {
  teamName = '';
  selectedCharacter = null;

  // reset team cards
  document.querySelectorAll('.team-card.selected').forEach(c => c.classList.remove('selected'));
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = true;
  nextBtn.classList.remove('ready');
  nextBtn.textContent = 'SELECT YOUR TEAM';

  // reset char cards
  submitBtn.disabled = true;
  submitBtn.classList.remove('ready');
  submitBtn.textContent = 'SELECT A CHARACTER';
  document.querySelectorAll('.char-card.selected').forEach(c => c.classList.remove('selected'));
  document.getElementById('voteForLabel').textContent = '말을 선택하세요';

  hideAll();
  setStep(1);
}

/* ══════════════════════════════════════
   SUBMIT
══════════════════════════════════════ */
submitBtn.addEventListener('click', async () => {
  if (!selectedCharacter || submitBtn.disabled) return;
  submitBtn.disabled = true;

  if (!db) {
    showError('Firebase 초기화 실패\n네트워크 확인 후 재시도');
    return;
  }
  if (!currentRoundId) {
    showError('진행 중인 라운드가 없습니다\n메인 화면에서 게임을 먼저 시작해주세요');
    return;
  }

  showState('submitting');

  try {
    const dupSnap = await db.collection(VOTES_COLLECTION)
      .where('roundId', '==', currentRoundId)
      .where('team',    '==', teamName)
      .get();
    if (!dupSnap.empty) {
      showError('이미 해당 팀에 투표했습니다.');
      return;
    }

    await db.collection(VOTES_COLLECTION).add({
      team:      teamName,
      character: selectedCharacter,
      timestamp: Date.now(),
      roundId:   currentRoundId
    });
    showSuccess(teamName, selectedCharacter);
  } catch (err) {
    console.error('Vote error:', err);
    showError('저장 실패\n잠시 후 다시 시도해주세요\n\n' + err.message);
  }
});

/* ══════════════════════════════════════
   STATE HELPERS
══════════════════════════════════════ */
function hideAll() {
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.remove('active');
  document.getElementById('stateSubmitting').classList.remove('visible');
  document.getElementById('stateSuccess').classList.remove('visible');
  document.getElementById('stateError').classList.remove('visible');
}

function showState(state) {
  hideAll();
  document.getElementById('state' +
    state.charAt(0).toUpperCase() + state.slice(1)).classList.add('visible');
}

function showSuccess(team, char) {
  document.getElementById('step3El').className = 'step done';
  document.getElementById('successDetail').innerHTML =
    `<span style="color:#ffe066">${team}</span> / <span style="color:#88aaff">${char}</span>`;
  showState('success');
}

function showError(msg) {
  document.getElementById('errorDetail').textContent = msg;
  showState('error');
}
</script>
