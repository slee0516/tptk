<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>무적의 야생마 - Opening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<!-- Firebase SDK (loaded early so it's ready before user reaches select screen) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d0d1a;
  color: #fff;
  font-family: 'Press Start 2P', 'Courier New', monospace;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ── SCANLINE OVERLAY ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── SCREENS ── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}

/* ── PIXEL TEXT HELPER ── */
.pixel-text {
  image-rendering: pixelated;
  letter-spacing: 0.08em;
}

/* ════════════════════════════
   OPENING SCREEN
════════════════════════════ */
#screen-opening {
  background: #0d0d1a;
}

.stars-bg {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur) infinite ease-in-out;
}
@keyframes twinkle {
  0%,100% { opacity: 0.2; }
  50%      { opacity: 1; }
}

/* ground strip */
.ground {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: repeating-linear-gradient(
    90deg,
    #1a3a1a 0px, #1a3a1a 16px,
    #143214 16px, #143214 32px
  );
  border-top: 4px solid #2d5a2d;
}

/* running horse silhouette */
.horse-silhouette {
  position: absolute;
  bottom: 60px;
  left: -120px;
  width: 120px;
  height: 80px;
  animation: horseRun 6s linear infinite;
}
@keyframes horseRun {
  0%   { left: -120px; }
  100% { left: calc(100vw + 120px); }
}

.title-container {
  text-align: center;
  z-index: 10;
  margin-bottom: 60px;
}

.title-ko {
  display: block;
  font-size: clamp(24px, 4.5vw, 56px);
  font-weight: 400;
  color: #ffe066;
  /* Shadow constrained to 3px offset — no overflow into sibling elements */
  text-shadow: 3px 3px 0 #b8860b;
  letter-spacing: 0.1em;
  line-height: 1.8;
  margin-bottom: 24px;
  animation: titlePulse 2s ease-in-out infinite;
  font-family: 'Press Start 2P', 'Courier New', monospace;
  image-rendering: pixelated;
}
@keyframes titlePulse {
  0%,100% { color: #ffe066; text-shadow: 3px 3px 0 #b8860b; }
  50%     { color: #fff5aa; text-shadow: 3px 3px 0 #b8860b; }
}

.title-en {
  display: block;
  font-size: clamp(7px, 1.1vw, 13px);
  color: #88aaff;
  letter-spacing: 0.3em;
  margin-top: 0;
  padding-top: 4px;
  text-transform: uppercase;
  line-height: 2;
}

.title-decoration {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 16px;
  font-size: clamp(24px, 4vw, 48px);
}

.press-enter {
  font-size: clamp(9px, 1.4vw, 16px);
  color: #fff;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  animation: blink 1s step-start infinite;
  margin-top: 40px;
  z-index: 10;
}
@keyframes blink {
  0%,49% { opacity: 1; }
  50%,100% { opacity: 0; }
}

/* pixel border frame */
.pixel-frame {
  position: absolute;
  inset: 12px;
  border: 4px solid #333;
  box-shadow: inset 0 0 0 4px #111, 0 0 0 4px #555;
  pointer-events: none;
  z-index: 5;
}
.pixel-frame::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 2px solid #222;
}
/* corner pixels */
.pixel-frame::after {
  content: '■';
  position: absolute;
  top: -12px;
  left: -12px;
  color: #ffe066;
  font-size: 20px;
}

/* ════════════════════════════
   CHARACTER SELECT SCREEN
════════════════════════════ */
#screen-select {
  background: #0a0a1f;
  padding: 20px;
}

.select-header {
  text-align: center;
  margin-bottom: 24px;
}

.select-title {
  display: block;
  font-size: clamp(10px, 1.8vw, 20px);
  color: #ffe066;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-shadow: 3px 3px 0 #7a5800;
  line-height: 1.8;
  margin-bottom: 14px;
  animation: titlePulse 2s ease-in-out infinite;
}

.select-subtitle {
  display: block;
  font-size: clamp(7px, 1vw, 11px);
  color: #88aaff;
  letter-spacing: 0.15em;
  margin-top: 0;
  padding-top: 2px;
  line-height: 2;
}

.select-layout {
  display: flex;
  gap: 32px;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  max-width: 1100px;
}

/* timer bar */
.timer-bar-container {
  width: 100%;
  max-width: 760px;
  height: 10px;
  background: #1a1a3a;
  border: 2px solid #333;
  margin: 0 auto 20px;
  position: relative;
}
.timer-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #ffe066, #ff6b35);
  width: 100%;
  transition: width 1s linear;
}

/* CHARACTER GRID */
.char-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  flex: 1;
  max-width: 760px;
}

.char-card {
  background: #111130;
  border: 3px solid #2a2a5a;
  border-radius: 4px;
  padding: 10px 6px 8px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
  position: relative;
  min-width: 0;
}
.char-card:hover {
  border-color: #ffe066;
  transform: translateY(-3px);
  background: #1a1a40;
}
.char-card:hover .char-name {
  color: #ffe066;
}
.char-card::before {
  content: attr(data-num);
  position: absolute;
  top: 3px;
  left: 5px;
  font-size: 9px;
  color: #555;
}

/* pixel character sprite drawn via CSS */
.pixel-char {
  width: 40px;
  height: 52px;
  margin: 0 auto 4px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.horse-icon {
  font-size: clamp(14px, 2vw, 20px);
  line-height: 1;
  margin-bottom: 2px;
  filter: drop-shadow(0 1px 0 #000);
}

.char-name {
  font-size: clamp(7px, 0.9vw, 10px);
  color: #ccc;
  font-family: 'Press Start 2P', 'Courier New', monospace;
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* QR PANEL */
.qr-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  min-width: 160px;
  flex-shrink: 0;
}

.qr-label {
  font-size: clamp(8px, 1vw, 11px);
  color: #ffe066;
  letter-spacing: 0.15em;
  text-align: center;
  text-shadow: 2px 2px 0 #7a5800;
  line-height: 2;
}

.qr-box {
  width: 152px;
  height: 152px;
  background: #fff;
  border: 6px solid #ffe066;
  box-shadow: 4px 4px 0 #7a5800;
  overflow: hidden;
  image-rendering: pixelated;
  position: relative;
  padding: 0;
  line-height: 0;
}


.qr-scan-text {
  font-size: clamp(7px, 0.9vw, 10px);
  color: #88aaff;
  letter-spacing: 0.1em;
  text-align: center;
  animation: blink 1.5s step-start infinite;
}

.countdown-text {
  font-size: clamp(7px, 1vw, 11px);
  color: #88aaff;
  letter-spacing: 0.08em;
  text-align: center;
  line-height: 1.8;
}

/* ════════════════════════════
   CHAR CARD TEAM BADGE
════════════════════════════ */
.vote-teams-badge {
  margin-top: 4px;
  min-height: 14px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 3px;
}
.team-pill {
  background: #1e1e4a;
  border: 1px solid #4444aa;
  border-radius: 2px;
  font-size: 7px;
  color: #aac4ff;
  padding: 1px 4px;
  letter-spacing: 0.05em;
  animation: pillPop 0.25s ease-out;
}
@keyframes pillPop {
  0%   { transform: scale(0.6); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}
.char-card.has-vote {
  border-color: #4444aa;
  background: #12122e;
}

/* ════════════════════════════
   VOTE LOG (LIVE BETS)
════════════════════════════ */
.vote-log-section {
  width: 100%;
  max-width: 1100px;
  margin-top: 14px;
  border-top: 2px solid #1a1a3a;
  padding-top: 10px;
}
.vote-log-header {
  font-size: clamp(7px, 0.9vw, 10px);
  color: #555;
  letter-spacing: 0.3em;
  margin-bottom: 8px;
}
.vote-log-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.vote-log-empty {
  font-size: clamp(7px, 0.9vw, 9px);
  color: #333;
  letter-spacing: 0.2em;
}
.vote-log-entry {
  display: flex;
  align-items: center;
  gap: 5px;
  background: #0d0d22;
  border: 2px solid #1e1e44;
  border-radius: 3px;
  padding: 4px 8px;
  font-size: clamp(7px, 0.9vw, 9px);
  animation: logSlide 0.3s ease-out;
}
@keyframes logSlide {
  0%   { opacity: 0; transform: translateY(-6px); }
  100% { opacity: 1; transform: translateY(0); }
}
.log-team {
  color: #ffe066;
  letter-spacing: 0.05em;
}
.log-arrow {
  color: #444;
}
.log-char {
  color: #88aaff;
  letter-spacing: 0.05em;
}
.log-new {
  border-color: #ffe066;
  background: #1a1a2a;
}

/* ════════════════════════════
   VOTE COUNTER
════════════════════════════ */
.vote-counter-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  width: 100%;
}

.vote-label {
  font-size: clamp(7px, 0.9vw, 10px);
  color: #88aaff;
  letter-spacing: 0.2em;
}

.vote-display {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #0d0d2a;
  border: 3px solid #2a2a5a;
  padding: 8px 14px;
  border-radius: 4px;
  transition: border-color 0.15s;
}
.vote-display.pulse {
  border-color: #ffe066;
  animation: votePulse 0.6s ease-out forwards;
}
@keyframes votePulse {
  0%   { box-shadow: 0 0 0 0 rgba(255,224,102,0.8); border-color: #ffe066; }
  40%  { box-shadow: 0 0 0 12px rgba(255,224,102,0.3); }
  100% { box-shadow: 0 0 0 0 rgba(255,224,102,0); border-color: #2a2a5a; }
}

.vote-num {
  font-size: clamp(20px, 3vw, 36px);
  color: #ffe066;
  text-shadow: 2px 2px 0 #b8860b;
  min-width: 2ch;
  text-align: center;
  transition: transform 0.15s, color 0.15s;
}
.vote-num.bump {
  transform: scale(1.4);
  color: #fff;
}
.vote-sep {
  font-size: clamp(14px, 2vw, 22px);
  color: #555;
}
.vote-total {
  font-size: clamp(20px, 3vw, 36px);
  color: #3a3a6a;
  text-shadow: 2px 2px 0 #1a1a3a;
}

/* individual vote pip track */
.vote-pips {
  display: flex;
  gap: 5px;
}
.pip {
  width: 12px;
  height: 12px;
  background: #1a1a3a;
  border: 2px solid #2a2a5a;
  border-radius: 2px;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
}
.pip.filled {
  background: #ffe066;
  border-color: #b8860b;
  box-shadow: 0 0 6px rgba(255,224,102,0.6);
}
.pip.just-filled {
  transform: scale(1.3);
}

/* firebase status dot */
.firebase-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 8px;
  color: #555;
  letter-spacing: 0.1em;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #555;
  flex-shrink: 0;
}
.status-dot.connected { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
.status-dot.error     { background: #ef4444; }

/* ════════════════════════════
   RACE BEGINS SCREEN
════════════════════════════ */
#screen-race-begins {
  background: #000;
  z-index: 20;
}

.race-begins-inner {
  text-align: center;
  position: relative;
  z-index: 10;
}

.race-begins-text {
  font-size: clamp(18px, 4vw, 52px);
  color: #ffe066;
  text-shadow: 4px 4px 0 #b8860b;
  letter-spacing: 0.25em;
  line-height: 1.8;
  opacity: 0;
  transform: scale(0.7);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.race-begins-text.show {
  opacity: 1;
  transform: scale(1);
}

.race-begins-sub {
  font-size: clamp(8px, 1.2vw, 14px);
  color: #888;
  letter-spacing: 0.4em;
  margin-top: 20px;
  opacity: 0;
  transition: opacity 0.4s ease 0.5s;
}
.race-begins-sub.show {
  opacity: 1;
}

/* scanline flash on race-begins */
.race-flash {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(255,224,102,0.04) 50%,
    transparent 100%
  );
  animation: scanFlash 0.12s linear infinite;
  pointer-events: none;
}
@keyframes scanFlash {
  0%   { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

.race-horses {
  font-size: clamp(28px, 5vw, 60px);
  letter-spacing: 0.3em;
  margin-top: 24px;
  opacity: 0;
  transition: opacity 0.4s ease 0.8s;
  animation: horseGallop 0.5s steps(2) infinite;
}
.race-horses.show { opacity: 1; }
@keyframes horseGallop {
  0%   { letter-spacing: 0.3em; }
  100% { letter-spacing: 0.5em; }
}

/* ════════════════════════════
   TRANSITION FLASH
════════════════════════════ */
.flash-overlay {
  position: fixed;
  inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 10000;
  transition: opacity 0.15s ease;
}
.flash-overlay.flashing {
  opacity: 1;
}

/* ── CANVAS SPRITE ── */
canvas.sprite {
  image-rendering: pixelated;
  display: block;
  margin: 0 auto 2px;
}
</style>
</head>
<body>

<!-- Flash overlay for screen transitions -->
<div class="flash-overlay" id="flash"></div>

<!-- ════════ OPENING SCREEN ════════ -->
<div class="screen active" id="screen-opening">
  <div class="pixel-frame"></div>
  <div class="stars-bg" id="stars"></div>
  <div class="ground"></div>

  <!-- Horse silhouette SVG -->
  <div class="horse-silhouette">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <!-- pixel-art horse built from rectangles -->
      <!-- body -->
      <rect x="20" y="28" width="56" height="24" fill="#2a2a2a"/>
      <!-- neck -->
      <rect x="60" y="14" width="16" height="20" fill="#2a2a2a"/>
      <!-- head -->
      <rect x="68" y="6" width="20" height="16" fill="#2a2a2a"/>
      <!-- ear -->
      <rect x="76" y="2" width="6" height="6" fill="#2a2a2a"/>
      <!-- mane -->
      <rect x="60" y="10" width="8" height="18" fill="#1a1a1a"/>
      <!-- tail -->
      <rect x="14" y="24" width="8" height="20" fill="#1a1a1a"/>
      <rect x="8"  y="36" width="8" height="12" fill="#1a1a1a"/>
      <!-- legs -->
      <rect x="26" y="50" width="8" height="20" fill="#2a2a2a"/>
      <rect x="38" y="50" width="8" height="16" fill="#2a2a2a"/>
      <rect x="52" y="50" width="8" height="20" fill="#2a2a2a"/>
      <rect x="64" y="50" width="8" height="16" fill="#2a2a2a"/>
      <!-- eye -->
      <rect x="82" y="10" width="4" height="4" fill="#ffe066"/>
      <!-- nose -->
      <rect x="84" y="18" width="4" height="2" fill="#555"/>
    </svg>
  </div>

  <div class="title-container">
    <div class="title-decoration">🐎 &nbsp; 🏆 &nbsp; 🐎</div>
    <div class="title-ko pixel-text">무적의 야생마</div>
  </div>

  <div class="press-enter pixel-text">▶ PRESS ENTER ◀</div>
</div>

<!-- ════════ CHARACTER SELECT SCREEN ════════ -->
<div class="screen" id="screen-select">
  <div class="select-header">
    <div class="select-title pixel-text">⚡ SELECT YOUR CHARACTER ⚡</div>
    <div class="select-subtitle pixel-text">— CHOOSE YOUR CHAMPION —</div>
  </div>

  <div class="timer-bar-container">
    <div class="timer-bar-fill" id="timerBar"></div>
  </div>

  <div class="select-layout">
    <!-- CHARACTER GRID -->
    <div class="char-grid" id="charGrid"></div>

    <!-- QR PANEL -->
    <div class="qr-panel">
      <div class="qr-label pixel-text">SCAN QR<br>TO VOTE</div>
      <div class="qr-box">
        <img src="qr.png" alt="QR Code - vote.html"
             style="width:100%;height:100%;display:block;image-rendering:pixelated;object-fit:fill;">
      </div>
      <div class="qr-scan-text pixel-text">▶ SCAN ME ◀</div>

      <!-- VOTE COUNTER -->
      <div class="vote-counter-wrap">
        <div class="vote-label pixel-text">VOTES RECEIVED</div>
        <div class="vote-display pixel-text" id="voteDisplay">
          <span class="vote-num" id="voteNum">0</span>
          <span class="vote-sep">/</span>
          <span class="vote-total">6</span>
        </div>
        <div class="vote-pips" id="votePips">
          <div class="pip" data-pip="1"></div>
          <div class="pip" data-pip="2"></div>
          <div class="pip" data-pip="3"></div>
          <div class="pip" data-pip="4"></div>
          <div class="pip" data-pip="5"></div>
          <div class="pip" data-pip="6"></div>
        </div>
        <div class="firebase-status" id="fbStatus">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText" class="pixel-text">CONNECTING...</span>
        </div>
      </div>

      <div class="countdown-text pixel-text" id="countdown">AUTO: 60s</div>
    </div>
  </div>

  <!-- LIVE BET LOG -->
  <div class="vote-log-section" id="voteLogSection">
    <div class="vote-log-header pixel-text">⚡ LIVE BETS</div>
    <div class="vote-log-list" id="voteLogList">
      <div class="vote-log-empty pixel-text">WAITING FOR VOTES...</div>
    </div>
  </div>
</div>

<!-- ════════ RACE BEGINS SCREEN ════════ -->
<div class="screen" id="screen-race-begins">
  <div class="race-flash"></div>
  <div class="race-begins-inner">
    <div class="race-begins-text pixel-text" id="raceBeginsText">THE RACE BEGINS</div>
    <div class="race-horses" id="raceHorses">🐎 🐎 🐎 🐎 🐎 🐎</div>
    <div class="race-begins-sub pixel-text" id="raceBeginseSub">ENTERING THE TRACK...</div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const CHARACTERS = [
  { name: '정환', color: '#ff6b6b', skinTone: '#f4a26a' },
  { name: '장우', color: '#4ecdc4', skinTone: '#d4956a' },
  { name: '사랑', color: '#ffe066', skinTone: '#f9c48a' },
  { name: '솔지', color: '#a78bfa', skinTone: '#f4a26a' },
  { name: '지영', color: '#f97316', skinTone: '#d4956a' },
  { name: '승훈', color: '#22c55e', skinTone: '#f4a26a' },
  { name: '가희', color: '#ec4899', skinTone: '#f9c48a' },
  { name: '서영', color: '#06b6d4', skinTone: '#f4a26a' },
  { name: '수연', color: '#84cc16', skinTone: '#f9c48a' },
  { name: '나현', color: '#f59e0b', skinTone: '#d4956a' },
  { name: '승균', color: '#3b82f6', skinTone: '#f4a26a' },
  { name: '소연', color: '#e879f9', skinTone: '#f9c48a' },
];

// 투표 완료 기준: 6개 조(팀) 모두 참여

/* ═══════════════════════════════════════════
   STARS BACKGROUND
═══════════════════════════════════════════ */
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --dur:${1.5 + Math.random()*3}s;
      animation-delay:${Math.random()*3}s;
    `;
    container.appendChild(s);
  }
})();

/* ═══════════════════════════════════════════
   PIXEL SPRITE DRAWING (Canvas)
═══════════════════════════════════════════ */
function drawPixelPerson(canvas, shirtColor, skinColor) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const S = W / 10; // scale: 10 units wide

  function px(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x*S, y*S, w*S, h*S);
  }

  // head
  px(3, 0, 4, 3, skinColor);
  // hair
  px(3, 0, 4, 1, '#1a1a1a');
  // eyes
  px(3.5, 1, 0.8, 0.8, '#222');
  px(5.7, 1, 0.8, 0.8, '#222');
  // body
  px(2.5, 3, 5, 3.5, shirtColor);
  // arms
  px(1, 3, 1.5, 2.5, shirtColor);
  px(7.5, 3, 1.5, 2.5, shirtColor);
  // pants
  px(2.5, 6.5, 2.2, 3, '#3344aa');
  px(5.3, 6.5, 2.2, 3, '#3344aa');
  // shoes
  px(2.2, 9.5, 2.5, 0.8, '#222');
  px(5.3, 9.5, 2.5, 0.8, '#222');
}

/* ═══════════════════════════════════════════
   CHARACTER GRID BUILD
═══════════════════════════════════════════ */
(function buildGrid() {
  const grid = document.getElementById('charGrid');
  CHARACTERS.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.num = String(i + 1).padStart(2, '0');
    card.title = ch.name;

    // Canvas sprite
    const cvs = document.createElement('canvas');
    cvs.className = 'sprite';
    cvs.width = 40;
    cvs.height = 40;
    cvs.style.width = '40px';
    cvs.style.height = '40px';
    card.appendChild(cvs);

    // Horse icon
    const horse = document.createElement('div');
    horse.className = 'horse-icon';
    horse.textContent = '🐎';
    card.appendChild(horse);

    // Name
    const name = document.createElement('div');
    name.className = 'char-name pixel-text';
    name.textContent = ch.name;
    card.appendChild(name);

    // Team badge row (filled by Firestore listener)
    const badge = document.createElement('div');
    badge.className = 'vote-teams-badge';
    badge.dataset.char = ch.name;
    card.appendChild(badge);

    grid.appendChild(card);

    // Draw after DOM insert
    requestAnimationFrame(() => drawPixelPerson(cvs, ch.color, ch.skinTone));
  });
})();

/* ═══════════════════════════════════════════
   SCREEN TRANSITION
═══════════════════════════════════════════ */
let currentScreen = 'opening';
const flash = document.getElementById('flash');

function flashAndGo(fn) {
  flash.classList.add('flashing');
  setTimeout(() => {
    fn();
    setTimeout(() => flash.classList.remove('flashing'), 150);
  }, 150);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen = id;
}

function goToSelect() {
  flashAndGo(() => {
    showScreen('screen-select');
    startCountdown();
  });
}

function goToRace() {
  flashAndGo(() => {
    window.location.href = 'horse-race.html';
  });
}

/* ═══════════════════════════════════════════
   AUTO-ADVANCE COUNTDOWN
═══════════════════════════════════════════ */
let countdownInterval = null;

async function startCountdown() {
  const bar = document.getElementById('timerBar');
  const txt = document.getElementById('countdown');

  // 진행 바 초기화 (0%부터 시작 — 투표 수에 따라 채워짐)
  bar.style.transition = 'none';
  bar.style.width = '0%';
  txt.textContent = `0 / ${VOTE_TARGET} 팀 투표 완료`;

  // 새 라운드 생성 후 Firestore 리스너 시작
  await createNewRound();
  initFirestore();
}

/* ═══════════════════════════════════════════
   INPUT HANDLING
═══════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (currentScreen === 'opening') {
      goToSelect();
    } else if (currentScreen === 'screen-select') {
      if (countdownInterval) clearInterval(countdownInterval);
      goToRace();
    }
  }
});

// Also allow click anywhere on opening screen
document.getElementById('screen-opening').addEventListener('click', () => {
  if (currentScreen === 'opening') goToSelect();
});

// Character card click → go to race immediately
document.getElementById('charGrid').addEventListener('click', (e) => {
  const card = e.target.closest('.char-card');
  if (card) {
    if (countdownInterval) clearInterval(countdownInterval);
    card.style.borderColor = '#ffe066';
    card.style.background = '#2a2a5a';
    setTimeout(() => goToRaceBegins(), 300);
  }
});

/* ═══════════════════════════════════════════
   RACE BEGINS SCREEN
═══════════════════════════════════════════ */
function goToRaceBegins() {
  if (countdownInterval) clearInterval(countdownInterval);
  if (firestoreUnsub) firestoreUnsub();

  flashAndGo(() => {
    showScreen('screen-race-begins');
    currentScreen = 'screen-race-begins';

    // animate in
    setTimeout(() => {
      document.getElementById('raceBeginsText').classList.add('show');
      document.getElementById('raceHorses').classList.add('show');
      document.getElementById('raceBeginseSub').classList.add('show');
    }, 100);

    // go to game after 2.8s
    setTimeout(() => {
      const rid = currentRoundId || localStorage.getItem('currentRoundId') || '';
      flashAndGo(() => {
        window.location.href = 'horse-race.html' + (rid ? '?roundId=' + rid : '');
      });
    }, 2800);
  });
}

// redirect old goToRace to new flow
function goToRace() { goToRaceBegins(); }

// 투표 문서가 들어있는 Firestore 컬렉션 이름
const VOTES_COLLECTION = 'votes';
// 투표 완료 기준 수
const VOTE_TARGET = 6;
// ──────────────────────────────────────────

let firestoreUnsub = null;
let currentVoteCount = 0;
let currentRoundId = null;
let currentVoteMap = {}; // { "정환": ["3조","5조"], ... }
let voteLogEntries = []; // [{ team, character, timestamp }, ...]

function setFirebaseStatus(state) {
  // state: 'connecting' | 'connected' | 'error'
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className  = 'status-dot ' + (state === 'connected' ? 'connected' : state === 'error' ? 'error' : '');
  text.textContent = state === 'connected' ? 'LIVE' : state === 'error' ? 'OFFLINE' : 'CONNECTING...';
}

function updateVoteUI(count) {
  const prev = currentVoteCount;
  currentVoteCount = count;

  const numEl     = document.getElementById('voteNum');
  const displayEl = document.getElementById('voteDisplay');
  const pips      = document.querySelectorAll('#votePips .pip');

  // number
  numEl.textContent = count;

  // bump animation on new vote
  if (count > prev) {
    numEl.classList.remove('bump');
    displayEl.classList.remove('pulse');
    // force reflow
    void numEl.offsetWidth;
    void displayEl.offsetWidth;
    numEl.classList.add('bump');
    displayEl.classList.add('pulse');

    setTimeout(() => {
      numEl.classList.remove('bump');
      displayEl.classList.remove('pulse');
    }, 600);
  }

  // pips
  pips.forEach((pip, i) => {
    const filled = i < count;
    const justFilled = i === count - 1 && count > prev;
    pip.classList.toggle('filled', filled);
    if (justFilled) {
      pip.classList.add('just-filled');
      setTimeout(() => pip.classList.remove('just-filled'), 300);
    }
  });
}

/* ═══════════════════════════════════════════
   ROUND 관리
═══════════════════════════════════════════ */
async function createNewRound() {
  if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    currentRoundId = 'r_' + Date.now();
    localStorage.setItem('currentRoundId', currentRoundId);
    await db.collection('rounds').doc('current').set({
      roundId: currentRoundId,
      startedAt: Date.now()
    });
    console.log('New round created:', currentRoundId);
  } catch (e) {
    console.error('Round create error:', e);
    // fallback: still use the ID even if write failed
    currentRoundId = 'r_' + Date.now();
    localStorage.setItem('currentRoundId', currentRoundId);
  }
}

/* ═══════════════════════════════════════════
   FIRESTORE 리스너
═══════════════════════════════════════════ */
function initFirestore() {
  if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
    setFirebaseStatus('error');
    document.getElementById('statusText').textContent = 'NO CONFIG';
    return;
  }
  if (!currentRoundId) return;

  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    setFirebaseStatus('connecting');

    if (firestoreUnsub) firestoreUnsub();

    firestoreUnsub = db.collection(VOTES_COLLECTION)
      .where('roundId', '==', currentRoundId)
      .onSnapshot(
        (snapshot) => {
          setFirebaseStatus('connected');

          // 투표 맵 & 로그 빌드 + 고유 팀 집계
          const newMap = {};
          const newLog = [];
          const uniqueTeams = new Set();
          snapshot.docs.forEach(doc => {
            const d = doc.data();
            if (!d.character || !d.team) return;
            uniqueTeams.add(d.team);
            if (!newMap[d.character]) newMap[d.character] = [];
            if (!newMap[d.character].includes(d.team)) {
              newMap[d.character].push(d.team);
            }
            newLog.push({
              team: d.team,
              character: d.character,
              timestamp: d.timestamp || 0
            });
          });
          newLog.sort((a, b) => b.timestamp - a.timestamp);

          currentVoteMap = newMap;
          voteLogEntries = newLog;

          // 고유 팀 수 기준으로 카운트
          const count = uniqueTeams.size;
          updateVoteUI(Math.min(count, VOTE_TARGET));
          updateCharCards(newMap);
          updateVoteLog(newLog.slice(0, 6));

          // 진행 바 & 텍스트 업데이트
          const bar = document.getElementById('timerBar');
          const txt = document.getElementById('countdown');
          if (bar) {
            bar.style.transition = 'width 0.35s ease';
            bar.style.width = `${Math.min(100, (count / VOTE_TARGET) * 100)}%`;
          }
          if (txt) {
            txt.textContent = count >= VOTE_TARGET
              ? '✅ ALL TEAMS VOTED! ▶'
              : `${count} / ${VOTE_TARGET} 팀 투표 완료`;
          }

          // 6개 고유 팀이 모두 투표하면 자동 진행
          if (count >= VOTE_TARGET && currentScreen === 'screen-select') {
            setTimeout(() => goToRaceBegins(), 800);
          }
        },
        (err) => {
          console.error('Firestore error:', err);
          setFirebaseStatus('error');
        }
      );
  } catch (e) {
    console.error('Firebase init error:', e);
    setFirebaseStatus('error');
  }
}

/* ═══════════════════════════════════════════
   캐릭터 카드 팀 뱃지 업데이트
═══════════════════════════════════════════ */
function updateCharCards(voteMap) {
  document.querySelectorAll('.vote-teams-badge').forEach(badge => {
    const char = badge.dataset.char;
    const teams = voteMap[char] || [];
    const card = badge.closest('.char-card');

    badge.innerHTML = '';
    if (teams.length > 0) {
      card.classList.add('has-vote');
      teams.forEach(team => {
        const pill = document.createElement('span');
        pill.className = 'team-pill pixel-text';
        pill.textContent = team;
        badge.appendChild(pill);
      });
    } else {
      card.classList.remove('has-vote');
    }
  });
}

/* ═══════════════════════════════════════════
   투표 로그 업데이트
═══════════════════════════════════════════ */
let _prevLogLen = 0;
function updateVoteLog(entries) {
  const list = document.getElementById('voteLogList');
  if (!list) return;

  if (entries.length === 0) {
    list.innerHTML = '<div class="vote-log-empty pixel-text">WAITING FOR VOTES...</div>';
    _prevLogLen = 0;
    return;
  }

  list.innerHTML = '';
  entries.forEach((e, i) => {
    const el = document.createElement('div');
    el.className = 'vote-log-entry pixel-text' + (i === 0 && entries.length > _prevLogLen ? ' log-new' : '');
    el.innerHTML = `<span class="log-team">${e.team}</span><span class="log-arrow">→</span><span class="log-char">${e.character}</span>`;
    list.appendChild(el);
    if (i === 0 && entries.length > _prevLogLen) {
      setTimeout(() => el.classList.remove('log-new'), 800);
    }
  });
  _prevLogLen = entries.length;
}

// initFirestore는 startCountdown() 내부에서 호출됨
// (Firebase SDK가 로드된 이후 보장)
